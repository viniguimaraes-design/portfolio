<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sobre — Vinicius Guimarães</title>
    <meta name="description" content="Designer, pesquisador e professor. Doutor e mestre em Design pela UERJ." />
    <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <a href="index.html" class="logo">
                <span class="logo-text">Vini Guimarães</span>
            </a>
            <nav class="desktop-menu">
                <ul>
                    <li><a href="index.html">Trabalhos</a></li>
                    <li><a href="sobre.html" class="active">Sobre</a></li>
                    <li><a href="contato.html">Contatos</a></li>
                </ul>
            </nav>
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
        </header>

        <!-- MENU MOBILE -->
        <div class="menu-overlay" id="menuOverlay">
            <nav class="fullscreen-menu">
                <ul>
                    <li><a href="index.html">Trabalhos</a></li>
                    <li><a href="sobre.html" class="active">Sobre</a></li>
                    <li><a href="contato.html">Contatos</a></li>
                </ul>
                <div class="social-links">
                    <a href="#"><i class="fab fa-github"></i></a>
                    <a href="#"><i class="fab fa-linkedin-in"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                </div>
            </nav>
        </div>

        <!-- ===== CONTEÚDO SOBRE ===== -->
        <section class="about-page" id="about-content">
            <div class="bio" id="bio-text"></div>
            <div class="about-grid" id="about-grid"></div>
        </section>

    </div>

    <script>
        // ===== MENU =====
        const menuToggle = document.getElementById('menuToggle');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuIcon = menuToggle.querySelector('i');

        function openMenu() {
            menuOverlay.classList.add('active');
            menuIcon.className = 'fas fa-times';
            menuIcon.classList.add('rotated');
            document.body.style.overflow = 'hidden';
        }

        function closeMenuFn() {
            menuOverlay.classList.remove('active');
            menuIcon.className = 'fas fa-bars';
            menuIcon.classList.remove('rotated');
            document.body.style.overflow = '';
        }

        menuToggle.addEventListener('click', () => {
            if (menuOverlay.classList.contains('active')) {
                closeMenuFn();
            } else {
                openMenu();
            }
        });

        document.querySelectorAll('.fullscreen-menu a').forEach(link => {
            link.addEventListener('click', closeMenuFn);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && menuOverlay.classList.contains('active')) {
                closeMenuFn();
            }
        });

        // ===== CARREGAR DADOS DO GOOGLE SHEETS =====
        const URL_PLANILHA = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRY-iRbNiuud4l3m93tk2I4wK4OgWj55HaXimi5x-gSNUCQMbZnV7RBhHfPbJsgYZlVTvJiGzcw_FeM/pub?gid=1089009557&single=true&output=csv';

        async function carregarDados() {
    try {
        const response = await fetch(URL_PLANILHA);
        const csv = await response.text();

        // Converte CSV em array
        const linhas = csv.split('\n').filter(linha => linha.trim() !== '');
        const cabecalho = linhas[0].split(',').map(item => item.trim().toLowerCase());
        
        const idxSubtitulo = cabecalho.indexOf('subtitulo');
        const idxConteudo = cabecalho.indexOf('conteudo');

        // Agrupa os itens por subtítulo
        const grupos = {};
        let bioText = '';

        for (let i = 1; i < linhas.length; i++) {
            // Pega os valores respeitando as aspas
            const colunas = linhas[i].match(/(".*?"|[^,]*)(,|$)/g).map(c => c.replace(/^,|,$/g, '').trim());
            const subtitulo = (colunas[idxSubtitulo] || '').replace(/^"|"$/g, '').trim();
            let conteudo = (colunas[idxConteudo] || '').replace(/^"|"$/g, '').trim();

            if (subtitulo.toLowerCase() === 'bio') {
                bioText = conteudo;
            } else if (subtitulo && conteudo) {
                if (!grupos[subtitulo]) {
                    grupos[subtitulo] = [];
                }
                grupos[subtitulo].push(conteudo);
            }
        }

        // Renderiza a bio
        const bioElement = document.getElementById('bio-text');
        if (bioText) {
            bioElement.innerHTML = `<p>${bioText}</p>`;
        }

        // Renderiza os itens em grid
        const grid = document.getElementById('about-grid');
        const itens = Object.keys(grupos).map(subtitulo => ({
            subtitulo,
            conteudo: grupos[subtitulo].join('<br />')
        }));

        let html = '';
        const col1 = [];
        const col2 = [];
        itens.forEach((item, index) => {
            const itemHtml = `
                <div class="about-item">
                    <h3>${item.subtitulo}</h3>
                    <p>${item.conteudo}</p>
                </div>
            `;
            if (index % 2 === 0) {
                col1.push(itemHtml);
            } else {
                col2.push(itemHtml);
            }
        });

        html += `<div class="about-col">${col1.join('')}</div>`;
        html += `<div class="about-col">${col2.join('')}</div>`;
        grid.innerHTML = html;

    } catch (error) {
        console.error('Erro ao carregar dados:', error);
        document.getElementById('about-content').innerHTML = '<p>Erro ao carregar conteúdo. Verifique se a planilha está publicada.</p>';
    }
}

                const bioElement = document.getElementById('bio-text');
                if (bioItems.length > 0) {
                    bioElement.innerHTML = `<p>${bioItems.join(' ')}</p>`;
                }

                // Renderiza os itens em grid
                const grid = document.getElementById('about-grid');
                let html = '';
                
                // Divide em duas colunas
                const col1 = [];
                const col2 = [];
                itens.forEach((item, index) => {
                    const itemHtml = `
                        <div class="about-item">
                            <h3>${item.subtitulo}</h3>
                            <p>${item.conteudo.replace(/\n/g, '<br />')}</p>
                        </div>
                    `;
                    if (index % 2 === 0) {
                        col1.push(itemHtml);
                    } else {
                        col2.push(itemHtml);
                    }
                });

                html += `<div class="about-col">${col1.join('')}</div>`;
                html += `<div class="about-col">${col2.join('')}</div>`;
                grid.innerHTML = html;

            } catch (error) {
                console.error('Erro ao carregar dados:', error);
                document.getElementById('about-content').innerHTML = '<p>Erro ao carregar conteúdo. Verifique se a planilha está publicada.</p>';
            }
        }

        carregarDados();
    </script>
</body>
</html>
