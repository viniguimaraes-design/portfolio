<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sobre — Vinicius Guimarães</title>
    <meta name="description" content="Designer, pesquisador e professor. Doutor e mestre em Design pela UERJ." />
    <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <a href="index.html" class="logo">
                <span class="logo-text">Vini Guimarães</span>
            </a>
            <nav class="desktop-menu">
                <ul>
                    <li><a href="index.html">Trabalhos</a></li>
                    <li><a href="sobre.html" class="active">Sobre</a></li>
                    <li><a href="contato.html">Contatos</a></li>
                </ul>
            </nav>
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
        </header>

        <!-- MENU MOBILE -->
        <div class="menu-overlay" id="menuOverlay">
            <nav class="fullscreen-menu">
                <ul>
                    <li><a href="index.html">Trabalhos</a></li>
                    <li><a href="sobre.html" class="active">Sobre</a></li>
                    <li><a href="contato.html">Contatos</a></li>
                </ul>
                <div class="social-links">
                    <a href="#"><i class="fab fa-github"></i></a>
                    <a href="#"><i class="fab fa-linkedin-in"></i></a>
                    <a href="#"><i class="fab fa-instagram"></i></a>
                </div>
            </nav>
        </div>

        <!-- ===== CONTEÚDO SOBRE ===== -->
        <section class="about-page" id="about-content">
            <!-- O conteúdo será carregado via JavaScript -->
        </section>

    </div>

    <script>
        // ===== MENU =====
        const menuToggle = document.getElementById('menuToggle');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuIcon = menuToggle.querySelector('i');

        function openMenu() {
            menuOverlay.classList.add('active');
            menuIcon.className = 'fas fa-times';
            menuIcon.classList.add('rotated');
            document.body.style.overflow = 'hidden';
        }

        function closeMenuFn() {
            menuOverlay.classList.remove('active');
            menuIcon.className = 'fas fa-bars';
            menuIcon.classList.remove('rotated');
            document.body.style.overflow = '';
        }

        menuToggle.addEventListener('click', () => {
            if (menuOverlay.classList.contains('active')) {
                closeMenuFn();
            } else {
                openMenu();
            }
        });

        document.querySelectorAll('.fullscreen-menu a').forEach(link => {
            link.addEventListener('click', closeMenuFn);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && menuOverlay.classList.contains('active')) {
                closeMenuFn();
            }
        });

        // ===== CARREGAR CONTEÚDO DO CMS =====
        async function carregarSobre() {
            try {
                const response = await fetch('/content/sobre/index.md');
                const markdown = await response.text();

                // Parse do frontmatter (YAML)
                const partes = markdown.split('---');
                const frontmatter = partes[1];
                const conteudo = partes[2] || '';

                // Extrair bio
                const bioMatch = frontmatter.match(/bio:\s*"([^"]*)"/);
                const bio = bioMatch ? bioMatch[1] : '';

                // Extrair itens
                const itensMatch = frontmatter.match(/itens:\s*([\s\S]*?)(?=\n\w|$)/);
                let itens = [];
                if (itensMatch) {
                    const raw = itensMatch[1];
                    const regex = /-\s*subtitulo:\s*"([^"]*)"\s*conteudo:\s*\|?\s*([\s\S]*?)(?=\n\s*-|\n\s*$|$)/g;
                    let match;
                    while ((match = regex.exec(raw)) !== null) {
                        itens.push({
                            subtitulo: match[1],
                            conteudo: match[2].trim()
                        });
                    }
                }

                // Renderizar
                const container = document.getElementById('about-content');
                let html = '';

                // Bio
                html += `<div class="bio"><p>${bio}</p></div>`;

                // Itens em grid
                html += `<div class="about-grid">`;
                const col1 = [];
                const col2 = [];
                itens.forEach((item, index) => {
                    const itemHtml = `
                        <div class="about-item">
                            <h3>${item.subtitulo}</h3>
                            <p>${item.conteudo.replace(/\n/g, '<br />')}</p>
                        </div>
                    `;
                    if (index % 2 === 0) {
                        col1.push(itemHtml);
                    } else {
                        col2.push(itemHtml);
                    }
                });
                html += `<div class="about-col">${col1.join('')}</div>`;
                html += `<div class="about-col">${col2.join('')}</div>`;
                html += `</div>`;

                container.innerHTML = html;

            } catch (error) {
                console.error('Erro ao carregar conteúdo:', error);
                document.getElementById('about-content').innerHTML = '<p>Erro ao carregar conteúdo. Tente novamente mais tarde.</p>';
            }
        }

        carregarSobre();
    </script>
</body>
</html>
