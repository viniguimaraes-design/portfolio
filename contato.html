<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato — Vini Guimarães</title>
    <meta name="description" content="Entre em contato para propostas, colaborações ou apenas para trocar uma ideia." />
    <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.9.6/css/academicons.min.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <!-- HEADER -->
        <header class="header">
            <a href="index.html" class="logo">
                <span class="logo-text">Vini Guimarães</span>
            </a>
            <nav class="desktop-menu">
                <ul>
                    <li><a href="index.html">Trabalhos</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="contato.html" class="active">Contatos</a></li>
                </ul>
            </nav>
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
        </header>

        <!-- MENU MOBILE -->
        <div class="menu-overlay" id="menuOverlay">
            <nav class="fullscreen-menu">
                <ul>
                    <li><a href="index.html">Trabalhos</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="contato.html" class="active">Contatos</a></li>
                </ul>
            </nav>
        </div>

        <!-- ===== CONTEÚDO CONTATO ===== -->
        <section class="contact-page">
            <div class="contact-content">
                <p class="contact-text">
                    Entre em contato para propostas, colaborações ou apenas para trocar uma ideia.
                </p>

                <!-- ===== EMAIL COM COPY ===== -->
<div class="contact-email-wrapper" id="emailWrapper">
    <span class="contact-email" id="emailDisplay">viniguimaraes@terra.com.br</span>
    <i class="fa-regular fa-copy copy-icon"></i>
    <span class="copy-feedback" id="copyFeedback"></span>
</div>

                <!-- ===== REDES SOCIAIS ===== -->
                <div class="contact-social-wrapper">
                    <span class="contact-social-label">Também estou por aqui:</span>
                    <div class="contact-social">
                        <a href="https://www.behance.net/viniguimaraes" target="_blank" aria-label="Behance">
                            <i class="fab fa-behance"></i>
                        </a>
                        <a href="http://lattes.cnpq.br/7362840394389611" target="_blank" aria-label="Lattes">
                            <i class="ai ai-lattes"></i>
                        </a>
                        <a href="https://github.com/viniguimaraes-design" target="_blank" aria-label="GitHub">
                            <i class="fab fa-github"></i>
                        </a>
                    </div>
                </div>

                <!-- ===== LOCALIZAÇÃO ===== -->
                <div class="contact-location">
                    <i class="fas fa-location-dot"></i>
                    <span>Niterói/RJ, Brasil</span>
                </div>
            </div>
        </section>

    </div>

    <script>
        // ===== COPY EMAIL =====
        document.addEventListener('DOMContentLoaded', function() {
            const copyBtn = document.getElementById('copyBtn');
            const feedback = document.getElementById('copyFeedback');
            const email = 'viniguimaraes@terra.com.br';
            let timeoutId = null;

            copyBtn.addEventListener('click', function() {
                navigator.clipboard.writeText(email).then(() => {
                    feedback.textContent = 'copiado!';
                    if (timeoutId) clearTimeout(timeoutId);
                    timeoutId = setTimeout(() => {
                        feedback.textContent = 'copiar';
                    }, 3000);
                }).catch(() => {
                    const textarea = document.createElement('textarea');
                    textarea.value = email;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    feedback.textContent = 'copiado!';
                    if (timeoutId) clearTimeout(timeoutId);
                    timeoutId = setTimeout(() => {
                        feedback.textContent = 'copiar';
                    }, 3000);
                });
            });
        });

        // ===== MENU MOBILE =====
        const menuToggle = document.getElementById('menuToggle');
        const menuOverlay = document.getElementById('menuOverlay');
        const menuIcon = menuToggle.querySelector('i');

        function openMenu() {
            menuOverlay.classList.add('active');
            menuIcon.className = 'fas fa-times';
            menuIcon.classList.add('rotated');
            document.body.style.overflow = 'hidden';
        }

        function closeMenuFn() {
            menuOverlay.classList.remove('active');
            menuIcon.className = 'fas fa-bars';
            menuIcon.classList.remove('rotated');
            document.body.style.overflow = '';
        }

        menuToggle.addEventListener('click', () => {
            if (menuOverlay.classList.contains('active')) {
                closeMenuFn();
            } else {
                openMenu();
            }
        });

        document.querySelectorAll('.fullscreen-menu a').forEach(link => {
            link.addEventListener('click', closeMenuFn);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && menuOverlay.classList.contains('active')) {
                closeMenuFn();
            }
        });
    </script>
</body>
</html>
